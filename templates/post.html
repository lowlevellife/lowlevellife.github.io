{% extends "base.html" %}

{% block title %}{{ post.title }} - Lowlevellife blogs{% endblock %}

{% block content %}
<p class="prompt">guest@lowlevellife:~$ cat {{ post.slug }}.md</p>
<article>
    <header class="post-header">
        <h1>{{ post.title }}</h1>
        <time datetime="{{ post.date.isoformat() }}">{{ post.date.strftime("%d %b %Y") }}</time>
    </header>
    {{ post.html|safe }}
</article>
<p><a href="{{ root }}index.html">&larr; back to all posts</a></p>
{% endblock %}
